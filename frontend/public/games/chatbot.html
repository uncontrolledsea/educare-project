<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #021028 0%, #0d1117 100%);
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #fff;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 100%;
        }

        #chat-header {
            background: linear-gradient(90deg, #58a6ff, #8f5fe4, #f778ba);
            padding: 16px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 2px 10px rgba(88, 166, 255, 0.3);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }

        #messages::-webkit-scrollbar-thumb {
            background: #58a6ff;
            border-radius: 3px;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #58a6ff, #8f5fe4);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-bubble {
            background: rgba(30, 30, 30, 0.8);
            color: #e0e0e0;
            border: 1px solid #30363d;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid #30363d;
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #58a6ff;
            animation: typingAnimation 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typingAnimation {
            0%, 60%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        #input-area {
            padding: 12px;
            border-top: 1px solid #30363d;
            background: rgba(20, 20, 20, 0.7);
            display: flex;
            gap: 8px;
        }

        #user-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #30363d;
            border-radius: 8px;
            background: rgba(30, 30, 30, 0.8);
            color: #fff;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }

        #user-input:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.3);
        }

        #send-button {
            padding: 10px 16px;
            background: linear-gradient(135deg, #58a6ff, #8f5fe4);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
            font-size: 14px;
        }

        #send-button:hover {
            transform: scale(1.05);
        }

        #send-button:active {
            transform: scale(0.98);
        }

        #send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

            default: "Great question! 🤔\n\nI have lots of knowledge about EduCare! Try asking me about:\n\n🎮 Games & Activities:\n• Math Bullseye, Grammar Galaxy, Science Lab, etc.\n\n🏆 Gamification:\n• XP, Levels, Badges, Leaderboards\n\n📋 Quests & Learning:\n• Daily Quests, Progress Tracking, Modules\n\n👥 Dashboards:\n• Student, Teacher, Parent features\n\n🎯 How to Use:\n• Getting started, earning XP, climbing leaderboard\n\n🆘 Support:\n• Troubleshooting, help options\n\n💬 Or just chat with me about education and learning!\n\nWhat would you like to know? 😊"
        };

        function addMessage(text, sender = 'user') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            messageDiv.appendChild(bubble);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTypingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'typing-indicator';
            
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            
            messageDiv.appendChild(typing);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        function getResponse(userText) {
            const text = userText.toLowerCase().trim();
            
            // Check for CET game issues
            if ((text.includes('cet') || text.includes('mission')) && (text.includes('not') || text.includes('work') || text.includes('broken') || text.includes('open') || text.includes('error'))) {
                return "🆘 CET Game Issue?\n\n✅ Fixed! Try these steps:\n\n1️⃣ Click 'CET Tactics Game' card again\n2️⃣ Wait for window to open (may take 2-3 seconds)\n3️⃣ Check if popup was blocked:\n   • Browser > Settings > Popups\n   • Allow popups for this site\n4️⃣ Try refreshing the page (F5)\n5️⃣ Clear browser cache (Ctrl+Shift+Delete)\n\n✨ Good News:\n• Game works OFFLINE ✅\n• No internet needed\n• Firebase optional\n\n🎮 Once opened:\n• Click 'Start Game'\n• Select subject & difficulty\n• Answer 30 questions\n• Compete on leaderboard!\n\nStill having issues? Try a different browser! 🚀";
            }
            
            // Check for exact matches first
            for (const [key, value] of Object.entries(knowledgeBase)) {
                if (text.includes(key)) {
                    return value;
                }
            }
            
            // Check for common question patterns
            if (text.includes('what') || text.includes('how') || text.includes('why') || text.includes('can')) {
                return "Great question! 🤔 I can help with that. Could you be more specific? Ask me about:\n• Math, Science, History, or English lessons\n• How to earn XP or badges\n• Daily quests\n• Game tips";
            }
            
            // Default response
            return knowledgeBase.default;
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add user message
            addMessage(text, 'user');
            userInput.value = '';
            sendButton.disabled = true;

            // Show typing indicator and simulate response
            showTypingIndicator();
            
            setTimeout(() => {
                removeTypingIndicator();
                const response = getResponse(text);
                addMessage(response, 'bot');
                sendButton.disabled = false;
                userInput.focus();
            }, 800 + Math.random() * 400);
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Welcome message
        window.addEventListener('load', () => {
            addMessage("👋 Welcome to EduCare AI Chatbot! I'm here to help you learn and answer your questions. What would you like to know?", 'bot');
            userInput.focus();
        });
    </script>
</body>
</html>
